name: Oracle ARM Auto Brush V4-Dynamic
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *' # 每10分钟运行一次

jobs:
  brush:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Setup Config and SSH Key
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.REGION }}" >> ~/.oci/config
          echo "key_file=~/.oci/key.pem" >> ~/.oci/config
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem ~/.oci/config
          ssh-keygen -t rsa -N "" -f ~/.ssh/id_rsa

      - name: Find AD and Image Automatically Then Brush
        run: |
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True
          
          echo "=== 步骤 1: 正在自动查询您账号专属的 AD 名字 ==="
          AD_LIST=$(oci iam availability-domain list --compartment-id "${{ secrets.TENANCY_OCID }}" --query "data[*].name" --raw-output | jq -r '.[]')
          
          if [ -z "$AD_LIST" ]; then
            echo "无法自动获取 AD，使用备用列表..."
            AD_LIST="lxlp:PHX-AD-1 lxlp:PHX-AD-2 lxlp:PHX-AD-3"
          fi
          echo "查询到的 AD 列表为:"
          echo "$AD_LIST"

          echo "=== 步骤 2: 正在自动查询最新的 Ubuntu 24.04 ARM 镜像 ==="
          IMAGE_ID=$(oci compute image list --compartment-id "${{ secrets.TENANCY_OCID }}" --operating-system "Canonical Ubuntu" --operating-system-version "24.04" --shape "VM.Standard.A1.Flex" --query 'data[0].id' --raw-output)
          
          if [ "$IMAGE_ID" == "None" ] || [ -z "$IMAGE_ID" ]; then
            IMAGE_ID="ocid1.image.oc1.phx.aaaaaaaavfbkczxpy4zopkqswucpfx7tv7x5xyjvppsp4l5tjkwv5kctr3dq"
          fi
          echo "最终使用镜像 OCID: $IMAGE_ID"

          echo "=== 步骤 3: 开始全自动轮询刷机 ==="
          for ad in $AD_LIST; do
            echo "正在尝试在 $ad 创建实例..."
            oci compute instance launch \
              --availability-domain "$ad" \
              --compartment-id "${{ secrets.TENANCY_OCID }}" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --image-id "$IMAGE_ID" \
              --subnet-id "${{ secrets.SUBNET_ID }}" \
              --ssh-authorized-keys-file ~/.ssh/id_rsa.pub \
              --assign-public-ip true \
              --display-name "Phoenix-ARM-24.04" \
              --wait-for-state RUNNING --max-wait-seconds 10 || echo "$ad 尝试结束"
          done
